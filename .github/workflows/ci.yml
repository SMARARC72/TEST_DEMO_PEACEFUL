name: CI/CD Pipeline

permissions:
  actions: read
  contents: read
  security-events: write

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  AWS_REGION: us-east-1
  SECURITY_SEVERITY_THRESHOLD: high
  SECURITY_ARTIFACT_RETENTION_DAYS: 90

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            prototype-web/package-lock.json
      - name: Install prototype dependencies
        run: cd prototype-web && npm ci
      - name: Type check prototype
        run: cd prototype-web && npx tsc -b
      - name: Lint (ESLint + jsx-a11y + complexity)
        run: cd prototype-web && npm run lint
      - name: Check merge artifacts
        run: cd prototype-web && npm run check:artifacts
      - name: Check circular dependencies
        run: cd prototype-web && npm run check:circular
      - name: Check synthetic data leaks
        run: cd prototype-web && npm run check:synthetic

  test-prototype:
    name: Test Prototype
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: prototype-web/package-lock.json
      - run: cd prototype-web && npm ci
      - run: cd prototype-web && npx vitest run --coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: prototype-web/coverage/
      - run: cd prototype-web && node scripts/verify-demo-stability.mjs

  build-prototype:
    name: Build Prototype
    runs-on: ubuntu-latest
    needs: test-prototype
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: prototype-web/package-lock.json
      - run: cd prototype-web && npm ci
      - run: cd prototype-web && npm run build
      - name: Check bundle size budget
        run: cd prototype-web && npm run check:bundle
      - uses: actions/upload-artifact@v4
        with:
          name: prototype-dist
          path: prototype-web/dist/


  terraform-validate-and-policy:
    name: Terraform Validate & Secrets Rotation Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - name: Terraform init (infra root)
        run: cd packages/infra/terraform && terraform init -backend=false
      - name: Terraform validate (infra root)
        run: cd packages/infra/terraform && terraform validate
      - name: Terraform init (prod env)
        run: cd packages/infra/terraform/environments/prod && terraform init -backend=false
      - name: Terraform validate (prod env)
        run: cd packages/infra/terraform/environments/prod && terraform validate
      - name: Secrets rotation policy check
        run: python3 packages/infra/scripts/check-secret-rotation-policy.py

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    env:
      FAIL_ON_SEVERITY: ${{ env.SECURITY_SEVERITY_THRESHOLD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Prepare security evidence directory
        run: mkdir -p ci-artifacts/security
      - name: Install dependencies (prototype)
        run: cd prototype-web && npm ci
      - name: Install dependencies (API)
        run: cd packages/api && npm ci
      - name: Install dependencies (shared)
        run: cd packages/shared && npm ci
      - name: Run npm audit (prototype)
        id: audit_prototype
        run: |
          set +e
          cd prototype-web
          npm audit --audit-level=${FAIL_ON_SEVERITY} --json > ../ci-artifacts/security/npm-audit-prototype.json
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Run npm audit (API)
        id: audit_api
        run: |
          set +e
          cd packages/api
          npm audit --audit-level=${FAIL_ON_SEVERITY} --json > ../../ci-artifacts/security/npm-audit-api.json
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Run npm audit (shared)
        id: audit_shared
        run: |
          set +e
          cd packages/shared
          npm audit --audit-level=${FAIL_ON_SEVERITY} --json > ../../ci-artifacts/security/npm-audit-shared.json
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: Perform CodeQL Analysis
        id: codeql
        uses: github/codeql-action/analyze@v3
        with:
          output: ci-artifacts/security/codeql-sarif
      - name: Enforce dependency vulnerability policy
        if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
        run: |
          if [ "${{ steps.audit_prototype.outputs.exit_code }}" -ne 0 ] || \
             [ "${{ steps.audit_api.outputs.exit_code }}" -ne 0 ] || \
             [ "${{ steps.audit_shared.outputs.exit_code }}" -ne 0 ]; then
            echo "Dependency vulnerability policy failed: High/Critical vulnerabilities are not allowed for PRs targeting main."
            exit 1
          fi
      - name: Enforce CodeQL severity policy
        if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
        uses: actions/github-script@v7
        with:
          script: |
            const threshold = process.env.FAIL_ON_SEVERITY.toLowerCase();
            const rank = { low: 1, medium: 2, high: 3, critical: 4 };
            const thresholdRank = rank[threshold] ?? rank.high;

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = `refs/pull/${context.payload.pull_request.number}/head`;

            const alerts = await github.paginate(github.rest.codeScanning.listAlertsForRepo, {
              owner,
              repo,
              ref,
              state: 'open',
              per_page: 100
            });

            const failingAlerts = alerts.filter((alert) => {
              const level = (alert.rule?.security_severity_level || alert.rule?.severity || 'low').toLowerCase();
              return (rank[level] ?? 0) >= thresholdRank;
            });

            if (failingAlerts.length > 0) {
              core.setFailed(`CodeQL policy failed: Found ${failingAlerts.length} open alerts at or above ${threshold}.`);
            } else {
              core.info(`CodeQL policy passed: no open alerts at or above ${threshold}.`);
            }
      - name: Gitleaks — secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: License compliance check
        run: |
          cd prototype-web
          npx license-checker --failOn 'GPL-2.0;GPL-3.0;AGPL-1.0;AGPL-3.0' --production --summary
      - name: Upload security scan evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-evidence
          path: ci-artifacts/security/
          retention-days: ${{ env.SECURITY_ARTIFACT_RETENTION_DAYS }}

  build-api:
    name: Build & Test API
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: peacefull
          POSTGRES_USER: peacefull
          POSTGRES_PASSWORD: peacefull_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U peacefull -d peacefull"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://peacefull:peacefull_dev@localhost:5432/peacefull?schema=public
      DIRECT_DATABASE_URL: postgresql://peacefull:peacefull_dev@localhost:5432/peacefull?schema=public
      ANTHROPIC_API_KEY: ci-anthropic-placeholder
      JWT_SECRET: ci-test-jwt-secret-minimum-thirty-two-characters-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-thirty-two-characters
      NODE_ENV: development
      PORT: 3001
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Remove checked-in API dotenv for CI
        run: rm -f packages/api/.env
      - name: Install shared dependencies
        run: cd packages/shared && npm ci
      - name: Install API dependencies
        run: cd packages/api && npm ci
      - name: Generate Prisma client
        run: cd packages/api && npx prisma generate
      - name: Apply database migrations
        run: cd packages/api && npx prisma migrate deploy
      - name: Seed database
        run: cd packages/api && npx tsx prisma/seed.ts
      - name: Type check API
        run: cd packages/api && npx tsc --noEmit
      - name: Run API unit tests
        run: cd packages/api && npx vitest run
      - name: Start API server
        run: cd packages/api && npx tsx src/server.ts &
      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:3001/health && break
            sleep 1
          done
      - name: Verify health endpoint
        run: curl -f http://localhost:3001/health

  build-ml-pipeline:
    name: Build ML Pipeline
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install ML pipeline dependencies
        run: cd packages/ml-pipeline && npm ci
      - name: Type check ML pipeline
        run: cd packages/ml-pipeline && npx tsc --noEmit
