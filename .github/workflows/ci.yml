name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  AWS_REGION: us-east-1

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            prototype-web/package-lock.json
      - name: Install prototype dependencies
        run: cd prototype-web && npm ci
      - name: Type check prototype
        run: cd prototype-web && npx tsc -b
      - name: Check artifacts
        run: cd prototype-web && npm run check:artifacts

  test-prototype:
    name: Test Prototype
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: prototype-web/package-lock.json
      - run: cd prototype-web && npm ci
      - run: cd prototype-web && npx vitest run
      - run: cd prototype-web && node scripts/verify-demo-stability.mjs

  build-prototype:
    name: Build Prototype
    runs-on: ubuntu-latest
    needs: test-prototype
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: prototype-web/package-lock.json
      - run: cd prototype-web && npm ci
      - run: cd prototype-web && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: prototype-dist
          path: prototype-web/dist/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run npm audit (prototype)
        run: cd prototype-web && npm ci && npm audit --audit-level=high || true
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  build-api:
    name: Build & Test API
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      JWT_SECRET: ci-test-jwt-secret-minimum-thirty-two-characters-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-thirty-two-characters
      NODE_ENV: development
      PORT: 3001
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install shared dependencies
        run: cd packages/shared && npm ci
      - name: Install API dependencies
        run: cd packages/api && npm ci
      - name: Generate Prisma client
        run: cd packages/api && npx prisma generate
      - name: Apply database migrations
        run: cd packages/api && npx prisma migrate deploy
      - name: Seed database
        run: cd packages/api && npx tsx prisma/seed.ts
      - name: Type check API
        run: cd packages/api && npx tsc --noEmit
      - name: Run API unit tests
        run: cd packages/api && npx vitest run
      - name: Start API server
        run: cd packages/api && npx tsx src/server.ts &
      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:3001/health && break
            sleep 1
          done
      - name: Verify health endpoint
        run: curl -f http://localhost:3001/health

  build-ml-pipeline:
    name: Build ML Pipeline
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install ML pipeline dependencies
        run: cd packages/ml-pipeline && npm ci
      - name: Type check ML pipeline
        run: cd packages/ml-pipeline && npx tsc --noEmit
