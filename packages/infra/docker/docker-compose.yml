version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: peacefull
      POSTGRES_USER: peacefull
      POSTGRES_PASSWORD: peacefull_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peacefull"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../..
      dockerfile: packages/infra/docker/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://peacefull:peacefull_dev@postgres:5432/peacefull
      JWT_SECRET: dev-jwt-secret-change-in-production
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-ant-dev-placeholder}
      AWS_REGION: us-east-1
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
