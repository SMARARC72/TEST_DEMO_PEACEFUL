[build]
  base = "prototype-web"
  command = "npm ci && npm run check:artifacts && npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "/api/v1"
  VITE_ENV = "production"
  VITE_ENABLE_MOCKS = "false"
  NODE_VERSION = "22.13.0"

# ─── API Proxy to AWS ALB ─────────────────────────────────────────────
# Proxies /api/* requests to the AWS backend (solves CORS + HTTPS mixed content)
[[redirects]]
  from = "/api/*"
  to = "http://peacefull-dev-alb-1054524413.us-east-1.elb.amazonaws.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Security Headers ────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.peacefull.ai https://*.neon.tech https://*.anthropic.com https://fonts.googleapis.com https://fonts.gstatic.com wss://*.netlify.app; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ─── Cache Control ────────────────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
