[build]
  base = "prototype-web"
  command = "npm ci && npm run check:artifacts && npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "/api/v1"
  VITE_ENV = "production"
  VITE_ENABLE_MOCKS = "false"
  NODE_VERSION = "22.13.0"
  VITE_AUTH0_DOMAIN = "dev-tu36ndmyt7pr2coi.us.auth0.com"
  VITE_AUTH0_CLIENT_ID = "1sYhiLWVUjrqwAgqT9SRwfGmz4Jjyd9X"
  VITE_AUTH0_AUDIENCE = "https://api.peacefull.ai"

# ─── API Proxy to Production Backend ──────────────────────────────────
# Proxies /api/* requests to the production API (TLS, custom domain)
# H10: headers = "X-RateLimit*" forwards rate-limit headers from backend
[[redirects]]
  from = "/api/*"
  to = "https://api.peacefull.cloud/api/:splat"
  status = 200
  force = true
  headers = {X-RateLimit-Limit = "", X-RateLimit-Remaining = "", X-RateLimit-Reset = ""}

# WebSocket proxy for real-time features (wss)
[[redirects]]
  from = "/ws"
  to = "wss://api.peacefull.cloud/ws"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Security Headers ────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.peacefull.cloud wss://api.peacefull.cloud https://*.peacefull.ai wss://*.peacefull.ai https://*.peacefull.cloud wss://*.peacefull.cloud https://*.anthropic.com https://fonts.googleapis.com https://fonts.gstatic.com wss://*.netlify.app https://dev-tu36ndmyt7pr2coi.us.auth0.com; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ─── Cache Control ────────────────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
